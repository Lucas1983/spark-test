services:
  master:
    container_name: master
    image: apache/spark:4.0.1
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
      --host master
      --port 7077
      --webui-port 8080
    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data:/opt/spark/data
      - ./out:/opt/spark/out
    ports:
      - "7077:7077"
      - "8080:8080"

  worker-1:
    container_name: worker-1
    image: apache/spark:4.0.1
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://master:7077
    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data:/opt/spark/data
      - ./out:/opt/spark/out
    depends_on:
      - master

  worker-2:
    container_name: worker-2
    image: apache/spark:4.0.1
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://master:7077
    volumes:
      - ./jobs:/opt/spark/jobs
      - ./data:/opt/spark/data
      - ./out:/opt/spark/out
    depends_on:
      - master